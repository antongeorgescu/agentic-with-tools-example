<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Q&A Generator App</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    .fallback-content {
      padding: 20px;
      background: orange;
    }
  </style>
</head>
<body>
  <app-root>
    <div class="fallback-content">
      <h2>Angular Loading...</h2>
    </div>
  </app-root>
  
  <script>
    console.log('Index.html loaded');
    setTimeout(() => {
      console.log('Checking if Angular loaded...');
      const appRoot = document.querySelector('app-root');
      if (appRoot && appRoot.innerHTML.includes('Angular Loading')) {
        console.error('Angular did not replace app-root content!');
      }
    }, 2000);
  </script>
</body>
</html>
